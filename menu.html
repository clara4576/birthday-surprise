<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Comic Sans MS;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#ffd6e7,#e4c1f9,#cdb4db,#bde0fe);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:100px;
font-size:42px;
animation:pop 2s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

button{

display:block;
margin:25px auto;
width:280px;
padding:18px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
animation:glow 2s infinite alternate;
}

button:hover{
transform:scale(1.1);
}

@keyframes glow{
from{box-shadow:0 0 10px pink}
to{box-shadow:0 0 25px purple}
}

.floating{
position:fixed;
font-size:24px;
animation:floatUp 6s linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>

</head>

<body>

<h1>✨ Choose One ✨</h1>

<button onclick="go('announcement.html')">🫣 Important Announcement 🤫</button>

<button onclick="go('gift.html')">Claim Your Birthday Gift 🎁</button>

<button onclick="go('dontclick.html')">🚫 Do Not Click!!! 🚫</button>

<script>

function go(page){
window.location=page
}

const emojis = ["💖","💗","💓","💕","🎉","✨","🎈"]

setInterval(()=>{

let e=document.createElement("div")

e.className="floating"

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"vw"
e.style.bottom="-20px"

document.body.appendChild(e)

setTimeout(()=>{
e.remove()
},6000)

},400)

</script>

</body>
</html>
