<!DOCTYPE html>
<html>
<head>
<title>Choose a Button</title>

<style>
body{
background:linear-gradient(135deg,#ffe5ec,#e0bbff,#d6f5ff);
font-family:'Comic Sans MS', cursive;
text-align:center;
padding-top:120px;
}

button{
display:block;
margin:25px auto;
padding:18px 50px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}
</style>
</head>

<body>

<h1>Pick a Button 👇</h1>

<button onclick="location.href='announcement.html'">
📢 Important Announcement
</button>

<button onclick="location.href='gift.html'">
🎁 Claim Your Birthday Gift
</button>

<button onclick="location.href='dontclick.html'">
🚫 Do Not Click!!!
</button>

</body>
</html>
