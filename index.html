<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffd6e7,#e0bbff,#cde7ff);
text-align:center;
overflow:hidden;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.gif{
width:200px;
margin-bottom:30px;
}

button{
padding:16px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<h1>A Little Surprise For You ✨</h1>

<img class="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<button onclick="location.href='menu.html'">
Open the Surprise 💌
</button>

<script>

setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);

</script>

</body>
</html>
