<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Comic Sans MS;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#ffd6e7,#e4c1f9,#cdb4db,#bde0fe);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:80px;
font-size:38px;
animation:bounce 2s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

img{
width:260px;
margin-top:20px;
border-radius:15px;
}

button{
margin-top:30px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px pink}
to{box-shadow:0 0 25px purple}
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<h1>✨ A Little Surprise For You ✨</h1>

<img src="snow-winter.gif">

<br>

<button onclick="goNext()">Open the Surprise 💌</button>

<script>

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")

c.innerHTML="🎉"

c.style.position="fixed"
c.style.left=Math.random()*100+"vw"
c.style.top=Math.random()*100+"vh"
c.style.fontSize="30px"

document.body.appendChild(c)

setTimeout(()=>{c.remove()},2000)

}

}

function goNext(){

confetti()

setTimeout(()=>{
window.location="menu.html"
},800)

}

setInterval(()=>{

let f=document.createElement("div")
f.innerHTML="💖"
f.style.position="fixed"
f.style.left=Math.random()*100+"vw"
f.style.top="-10px"
f.style.fontSize="22px"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},5000)

},500)

</script>

</body>
</html>
