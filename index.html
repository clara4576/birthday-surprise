<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS', cursive;
background:linear-gradient(135deg,#ffd6e7,#e0c3fc,#cde7ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<h1>✨ A Little Surprise For You ✨</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="220">

<br>

<button onclick="location.href='menu.html'">
Open the Surprise 💌
</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6d1c6e3c34.mp3" type="audio/mpeg">
</audio>

<script>
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},500);
</script>

</body>
</html>
